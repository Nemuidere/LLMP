services:
  backend:
    build: ./backend
    image: llmp-backend:dev
    container_name: llmp-backend
    ports:
      - "8000:8000"
    environment:
      YOUTUBE_API_KEY: ${YOUTUBE_API_KEY:-}
      DEEPL_API_KEY: ${DEEPL_API_KEY:-}
      DATABASE_URL: sqlite:////app/data/llmp.db
      IP_HASH_SALT: ${IP_HASH_SALT:-llmp-dev-salt}
      OFFSET_ENABLED: ${OFFSET_ENABLED:-false}
      CORS_ORIGINS: '["http://localhost:5173","http://localhost:8000"]'
    volumes:
      # Persist SQLite + dictionary JSONL across container restarts.
      - ./backend/data:/app/data
      # Live-reload during dev: mount source so edits don't require rebuild.
      - ./backend/app:/app/app
      - ./backend/scripts:/app/scripts
    command: ["uvicorn", "app.main:app", "--host", "0.0.0.0", "--port", "8000", "--reload"]

  frontend:
    build: ./frontend
    image: llmp-frontend:dev
    container_name: llmp-frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"
    environment:
      # Vite resolves API calls to this host inside the container network.
      VITE_BACKEND_HOST: backend
    volumes:
      # Live-edit: mount source. node_modules stays inside the image
      # via an anonymous volume to avoid platform-mismatch issues.
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html
      - ./frontend/vite.config.ts:/app/vite.config.ts
      - ./frontend/tailwind.config.js:/app/tailwind.config.js
      - ./frontend/postcss.config.js:/app/postcss.config.js
      - ./frontend/tsconfig.json:/app/tsconfig.json
      - /app/node_modules
    command: ["npm", "run", "dev"]
